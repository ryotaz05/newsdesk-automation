name: NewsDesk Daily Automation

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  newsdesk-update:
    runs-on: ubuntu-latest
    name: NewsDesk メール取得・記事登録・統計確認

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.9 をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: "📧 ステップ1: テスト用記事データを生成・登録"
        id: fetch
        run: |
          python3 - << 'PYTHON'
import json
import os
from datetime import datetime
import requests

# テスト用ダミー記事データ
test_articles = [
    {
        "source": "test",
        "title": "GitHub Actions テスト記事 1",
        "url": "https://example.com/article1",
        "snippet": "これはテスト用のダミー記事です。GitHub Actions からの自動配信テストです。",
        "date": datetime.now().strftime("%Y-%m-%d"),
        "category": "テスト",
        "tags": ["テスト", "自動化", "GitHub Actions"],
        "original_source": "GitHub Actions Test"
    },
    {
        "source": "test",
        "title": "GitHub Actions テスト記事 2",
        "url": "https://example.com/article2",
        "snippet": "2つ目のテスト記事です。Supabase 登録テストの確認用です。",
        "date": datetime.now().strftime("%Y-%m-%d"),
        "category": "テスト",
        "tags": ["テスト", "Supabase", "登録"],
        "original_source": "GitHub Actions Test"
    }
]

# Supabase に登録
SUPABASE_URL = os.environ.get("SUPABASE_URL")
SUPABASE_KEY = os.environ.get("SUPABASE_KEY")

print(f"✓ テスト用記事データを生成しました（{len(test_articles)}件）")
print(json.dumps(test_articles, indent=2, ensure_ascii=False))

# Supabase REST API で登録
for article in test_articles:
    try:
        response = requests.post(
            f"{SUPABASE_URL}/rest/v1/articles",
            json=article,
            headers={
                "apikey": SUPABASE_KEY,
                "Authorization": f"Bearer {SUPABASE_KEY}",
                "Content-Type": "application/json"
            }
        )
        if response.status_code in [200, 201]:
            print(f"✓ 登録成功: {article['title']}")
        else:
            print(f"⚠ 登録失敗: {article['title']} - {response.status_code}")
    except Exception as e:
        print(f"❌ エラー: {str(e)}")

PYTHON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: "✅ 完了"
        run: |
          echo "🎉 NewsDesk GitHub Actions テスト実行が完了しました"
          echo "実行時刻: $(date)"
