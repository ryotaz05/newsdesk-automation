name: NewsDesk Daily Automation

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  newsdesk-update:
    runs-on: ubuntu-latest
    name: NewsDesk メール取得・記事登録・統計確認

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.9 をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: "📧 ステップ1: テスト記事を登録"
        run: python3 github_actions_fetch.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: "✅ 完了"
        run: echo "🎉 ワークフロー実行完了"
