name: NewsDesk Daily Automation

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  newsdesk-update:
    runs-on: ubuntu-latest
    name: NewsDesk メール取得・記事登録・統計確認

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.9 をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: テスト実行
        run: |
          echo "✓ NewsDesk 自動化ワークフロー準備完了"
